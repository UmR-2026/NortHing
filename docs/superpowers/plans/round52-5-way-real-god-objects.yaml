      Package: northhing-ai-adapters (-p northhing-ai-adapters --lib)

      ## CRITICAL iron rules (R40-R50 lessons)
      1. 0 `_lost_methods.rs`, 0 `part1.rs`/`part2.rs` mechanical naming
      2. mod.rs <= 600, sibling <= 800
      3. Fields `pub(super)` for cross-sibling struct field access
      4. Wildcard re-export `pub use super::*;` in mod.rs
      5. Write .rs with Edit tool (auto UTF-8), NOT PowerShell Out-File
      6. MUST run `cargo check -p <crate> --lib` to verify the lib compiles
      7. core.autocrlf=false set locally on worktree

      ## Sub-domain split
      openai.rs covers OpenAI-compatible streaming response parsing. Suggested split:
        - openai_types.rs        — request/response DTOs, JSON Schema types
        - openai_parser.rs       — SSE event parsing, JSON-to-domain conversion
        - openai_stream.rs       — streaming response wrapper, async iteration
        - openai_tool_calls.rs   — function/tool call extraction from deltas
        - openai_errors.rs       — error mapping, rate-limit/retry handling
      Cross-ref: `git grep 'openai::' -- ':!openai.rs'`

      ## PREFLIGHT
      $p = "src/crates/adapters/ai-adapters/src/stream/types/openai.rs"
      $wc = [System.IO.File]::ReadAllLines((Resolve-Path $p).Path).Count
