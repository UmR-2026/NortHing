# =============================================================================
# Errata (2026-07-11, Mavis fact-check pre-dispatch)
# =============================================================================
# v1: spec/plan originally assumed "transcript has no integrity check" + "sub-agent
#     writes transcript". Both wrong. Plan adjusted to:
#     - transcript_fingerprint.rs:66 already implements per-transcript SHA-256
#       fingerprint (hash of canonical payload, computed on demand)
#     - sub-agent (a1_path.rs + subagent_orchestrator/) does NOT write transcript
#       (sub-agent runs in isolated LongRunningSkill context, separate from
#       main agent's transcript stream)
#     - B-3 scope: add per-TURN checksum (granularity finer than per-transcript)
#       at the write point (turn_io.rs::save_dialog_turn), verify on read
#       (turn_io.rs::load_dialog_turn), and audit parent->child links
# v2: pending post-dispatch (will be added if Mavis 5-axis pre-flight finds
