#     vs code drift during implementation.
# =============================================================================

tasks:
  # ===========================================================================
  # Round 1: B-3 (per-turn transcript checksum)
  # ===========================================================================
  # - No upstream dependency
  # - Closes defense-in-depth gap: currently only per-transcript fingerprint
  #   (transcript_fingerprint.rs:66); per-turn checksum catches corruption
  #   at write time, before it propagates to transcript-level hash
  # ===========================================================================
  - id: impl-b3-checksum
    title: "B-3: Per-turn transcript checksum (SHA-256, verify on read, parent link audit)"
    agent: coder
    prompt: |
      Goal: Add per-turn SHA-256 checksum to transcript persistence.
      Verify on read; fail loudly on mismatch. Audit parent->child turn links.

      Base: main HEAD at dispatch time.
      Worktree: E:/agent-project/northing-impl-b3-checksum
      Branch: impl/b3-checksum

      ## Spec
      E:/agent-project/northing/docs/superpowers/specs/2026-07-11-sub-agent-orchestration-hardening.md
      (section "Workstream B-3: Transcript checksum integrity")

      ## Errata v1 (read first!)
      transcript_fingerprint.rs:66 ALREADY implements per-transcript SHA-256
      fingerprint (computed on demand, not stored). This work is **per-turn
      granularity** which is finer than the existing fingerprint:
      - Existing: per-transcript fingerprint (whole session, on demand)
      - This work: per-turn checksum (each save_dialog_turn writes a checksum
        field in the turn file; load_dialog_turn verifies before parsing)
      - Both coexist: per-turn is write-time defense; per-transcript is
        read-time whole-session integrity

      ## Background
      E:/agent-project/northing/docs/architecture/homerail-architecture-analysis.md
      (section 2.6 "Audit and replay" — HomeRail pattern)

      ## MODEL REQUIREMENT
      Use stepfun/step-3.7-flash. Append MODEL_IN_USE: stepfun/step-3.7-flash
      to first output line.

      ## Files to modify (verified by Mavis 2026-07-11, git ls-files)
      - src/crates/assembly/core/src/agentic/persistence/turn_io.rs
        (lines around `pub async fn save_dialog_turn` and `load_dialog_turn`)
      - src/crates/assembly/core/src/agentic/persistence/turn_metadata_sync.rs
        (lines around `read_metadata_tail_turns` — need to read checksum too)

      ## Files to create
      - src/crates/assembly/core/src/agentic/persistence/turn_checksum.rs (NEW)
        Define:
        - `pub(super) fn compute_turn_checksum(turn: &DialogTurnData) -> [u8; 32]`
        - `pub(super) fn verify_turn_checksum(turn: &DialogTurnData, expected: &[u8; 32]) -> Result<(), TurnChecksumError>`
        - `pub(super) fn audit_turn_parent_links(workspace: &Path) -> Result<(), TurnLinkError>`
        - Hash includes: turn_id, turn_index, user content, assistant blocks,
          tool blocks, thinking blocks, parent_turn_id (if any), timestamp
        - Use sha2::Sha256 from existing sha2 dep (already in workspace)

      ## Procedure
      1. cd E:/agent-project/northing-impl-b3-checksum
      2. git config --local core.autocrlf false
      3. Create turn_checksum.rs with 3 functions above
      4. Modify turn_io.rs:
         - `save_dialog_turn`: compute checksum before write; store in
           `<turn_id>.checksum` sidecar file (NOT in turn json itself, to
           preserve turn file format)
         - `load_dialog_turn`: read checksum sidecar; verify before
           parsing turn json; on mismatch, return
           `PersistenceError::TurnChecksumMismatch { turn_id, expected, got }`
      5. Modify turn_metadata_sync.rs:
         - `read_metadata_tail_turns`: skip turns with checksum mismatch,
           log warning, continue (don't fail the whole metadata read)
      6. Register turn_checksum module in persistence/mod.rs
      7. Tests: 3 scenarios
         - clean read OK (existing baseline, must still pass)
         - single-turn corruption detected (modify turn file bytes, assert error)
         - parent link gap detected (delete middle turn, assert audit_turn_parent_links
           returns error)
      8. Verify: cargo test -p northhing-core --lib transcript (must pass)
      9. Verify: cargo test -p northhing-core --lib (914 baseline preserved)
      10. Verify: cargo build -p norththing-core --lib --features service-integrations
          (must be 0 errors, B decision feature-gate fix preserved)
      11. Verify: cargo build -p northhing-core --lib --features product-full
          (must be 0 errors)
      12. Verify: cargo check -p northhing-core --lib --features service-integrations
          (must be 0 errors, B-1 per-feature compile validation)
      13. Verify: cargo check -p northhing-core --lib --features product-full
          (must be 0 errors, B-1 per-feature compile validation)
      14. Commit: refactor(persistence): B-3 per-turn transcript checksum (SHA-256, parent link audit)
      15. Report back via mavis communication send --to <session> --command prompt --content
          "B-3 TASK COMPLETE. commit SHA. cargo test baseline (914) preserved.
          3 feature combinations 0 errors. STAND DOWN."

      ## DO NOT
      - DO NOT add blake3 or other non-SHA256 hash; use existing sha2 dep
      - DO NOT put checksum in turn json file (preserve format; use sidecar)
      - DO NOT verify on write (perf cost); lazy verify on read
      - DO NOT touch transcript_fingerprint.rs (existing per-transcript
        fingerprint stays as is; this is complementary, not replacement)
      - DO NOT touch R67-R72 god-file-split files (other workstream)
      - DO NOT change PersistenceManager public API

      ## DEFINITION OF DONE
      - turn_checksum.rs created with 3 functions
      - turn_io.rs: save writes checksum sidecar, load verifies
      - turn_metadata_sync.rs: skips bad-checksum turns with warning
      - 3 test scenarios pass
      - cargo test -p northhing-core --lib: 914 passed baseline preserved
      - 3 feature combinations (default / service-integrations / product-full):
        all 0 errors
      - 0 fmt diffs (pre-existing 156 fmt noise not affected)

