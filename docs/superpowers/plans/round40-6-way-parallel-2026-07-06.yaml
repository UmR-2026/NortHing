      Package: `northhing-core` (use `-p northhing-core --features product-full --lib`)

      ## CRITICAL 教训 (R40-R49 半成品 review)
      1. **0 `_lost_methods.rs` placeholder** — 必须按 sub-domain 拆到正确 sibling, 不许用 _lost_methods 占位
      2. **0 `part1.rs`/`part2.rs` 机械命名** — 必须 `init.rs`/`state.rs`/`dispatch.rs`/`types.rs`/`helpers.rs` sub-domain 命名
      3. **mod.rs ≤ 600 行** — 只放 `mod sibling;` 声明 + `pub use super::*;` re-export + 必要 struct 定义
      4. **每个 sibling ≤ 800 行** (R20 容差 242 留给 client/manager_*.rs)
      5. **fields `pub(super)`** for cross-sibling struct field access
      6. **wildcard re-export**: `pub use super::*;` in mod.rs (R25+R27+R29+R31+R37+R38 pattern)
      7. **encoding**: 写 .rs 必用 Edit/Write tool, 禁 PowerShell Out-File/Set-Content
      8. **commit 前 encoding verify**: `py -c "raw=open(f,'rb').read(); assert raw[:3]!=b'\\xef\\xbb\\xbf', f; assert b'\\r\\n' not in raw, f"` 全 staged .rs

      ## Shared iron rules (R5-R39 沉淀)
      - 0 NEW unwrap()/panic!/unreachable! (新引入的; pre-existing 不算)
      - 0 NEW CRLF/BOM
      - 0 Cargo.lock drift (禁 `cargo update`, 只用 `cargo check`)
      - 0 NEW cargo fmt diff (commit 前 `cargo fmt -p <crate> -- --check` 必须空)
      - 0 cross-crate module reference (preserve 所有 `pub use` re-export 路径)
      - `cargo test -p <crate> --lib` 不退化 (pass 数 ≥ baseline)
      - Long line cap: ≤120 chars; 0 NEW per file (R18+ 容差 ≤5/file, producer commit 必 document)
      - 1 atomic commit per task (no WIP commits)

      ## Sub-domain split 必做
      1. `git show HEAD:<file>` 看原 struct + impl 完整 schema (R31 教训: 不靠 consumer 反推)
      2. `rg -n '^(impl|pub struct|pub enum|pub trait) '` 找 sub-domain 边界
      3. 设计 facade + 4-6 sibling (sub-domain 命名, NOT part1/N)
      4. 候选 sub-domain (按 file 内容决定): `host_init.rs` / `host_state.rs` / `host_dispatch.rs` / `host_types.rs` / `host_helpers.rs` / `host_actions.rs`
      5. 必先 `git grep 'computer_use_host\|ComputerUseHost' -- ':!<file>'` 找 cross-crate consumer

      ## Cross-crate consumer verification
      `git grep 'computer_use_host\|ComputerUseHost' -- ':!src/crates/assembly/core/src/agentic/tools/computer_use_host.rs'`
      For each consumer crate: `cargo check -p <consumer> --message-format=short`

      ## PREFLIGHT
      ```
      $p = "src/crates/assembly/core/src/agentic/tools/computer_use_host.rs"
      $wc = [System.IO.File]::ReadAllLines((Resolve-Path $p).Path).Count
      Write-Host "computer_use_host.rs canonical wc-l = $wc (expected 1811)"
      $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
      cargo check -p northhing-core --features product-full --lib --message-format=short 2>&1 | Tee-Object baseline.log
      $baselineErrors = (Select-String -Path baseline.log -Pattern "error\[" | Measure-Object).Count
      Write-Host "BASELINE_ERRORS=$baselineErrors (expected 0)"
      ```
      If BASELINE_ERRORS != 0, stop and report baseline.

      ## Implementation
      1. Create worktree (if not exists) + branch from main 4841f3bd
      2. Create `computer_use_host/` subdir + move original to `mod.rs` (facade)
      3. Create 4-6 sibling files in subdir (sub-domain 命名, NOT part1/N)
      4. `mod.rs` content:
         ```
         //! <doc>
         pub(crate) use <necessary cross-crate imports>;
         pub(crate) use super::*;  // wildcard re-export
         mod <sibling_1>;
         mod <sibling_2>;
         ...
         pub(crate) use <sibling_1>::*;  // optional, if sibling fn need cross-mod access
         pub(crate) use <sibling_2>::*;
         ...
         ```
      5. Each sibling content:
         ```
         use super::*;
         <impl block for sub-domain 1>
         ```
      6. `cargo check -p northhing-core` (单 crate 验证)
      7. For each cross-crate consumer: `cargo check -p <consumer>`
      8. `cargo fmt -p northhing-core -- --check` (无 diff)
      9. `git diff main -- Cargo.lock` (0 lines drift)
      10. `cargo test -p northhing-core --lib` (pass 数 ≥ baseline)
      11. Encoding verify on all staged .rs:
          `py -c "raw=open(f,'rb').read(); assert raw[:3]!=b'\\xef\\xbb\\xbf'; assert b'\\r\\n' not in raw"`

      ## Commit
      ```
      git add -A
      git commit -m "refactor(core): R40a split computer_use_host.rs 1811 -> facade + N sibling"
      ```
      ⚠️ NEVER `git commit --amend` — R39c 0-byte 教训. Use `git reset HEAD~1` + new commit.

      ## Self-report (commit 后必输出)
      ```
      ## R40a self-report

      Branch: impl/r40a-core-computer-use-host-split
      Commit: <hash>
      File: src/crates/assembly/core/src/agentic/tools/computer_use_host.rs
      Before: 1811 行
      After:
      - facade (mod.rs): <actual> 行
      - <sibling_1>.rs: <actual> 行 (sub-domain: <name>)
      - <sibling_2>.rs: <actual> 行 (sub-domain: <name>)
      ...

      Verification:
      - cargo check -p northhing-core: 0 errors
      - cargo check -p <consumer_1>: 0 errors
      - cargo fmt -p northhing-core -- --check: 0 diff
      - git diff main -- Cargo.lock: 0 lines drift
      - cargo test -p northhing-core --lib: <N> pass (baseline <M>)
      - Encoding check: 0 BOM, 0 CRLF
      0 NEW unwrap/panic/unreachable.
      0 _lost_methods.rs files created.
      0 part1.rs/part2.rs mechanical naming.
      ```

      ## Failure handling
      - E0624 (method private) → 加 `pub(super)` (除 trait Default/Drop implicit visibility, 不要加)
      - E0616 (field private) → 加 `pub(super)`
      - E0432 (use path wrong) → 严格按文件层级
      - E0599 (trait not in scope) → 加 `use TraitName;`
      - cargo check fail → git stash + checkout clean baseline commit + 重跑 cargo check 区分 pre-existing vs new

      ## Mavis take-over 信号
      - 30 min 无 commit → Mavis 会 take-over, 停手
      - Mavis `mavis communication send` 发 abort → 立刻停

