      # R40a: computer_use_host.rs god-split (R5 教训: 这是 critical zone 第一个)

      ## Target:
      src/crates/assembly/core/src/agentic/tools/computer_use_host.rs (1811 lines)
      Worktree: E:/agent-project/northing-impl-r40a-core-computer-use-host (branch
