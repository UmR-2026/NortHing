      ## 铁律 + Sub-domain split
      Same as R40a.

      ## SPECIAL: R26 interface crate pattern
      ports.rs 是 interface trait 集合 (参考 R26 runtime-ports/lib.rs 拆 4 sibling 模式)
      - port_core: base PortError, PortResult, RuntimeServicePort
      - port_session: SessionPort
      - port_execution: ExecutionPort
      - port_runtime: RuntimePort
      5 sibling 决策: 如果 port_dialog + submission_events 之间有 30+ cross-ref, 合并入 port_execution (R26 教训)

      ## Cross-ref 最小化
      - port_core: base (无 cross-ref)
      - port_session: `use super::port_core::{PortError, PortResult};`
      - port_execution: `use super::port_core::{PortError, PortResult}; use super::port_session::SessionPort;`
      - port_runtime: `use super::port_core::{PortError, PortResult}; use super::port_execution::ExecutionPort;`

      ## Python f-string `{{` 陷阱
      写 Rust file with `use serde::{Deserialize, Serialize};` — 必在 raw string, 禁 f-string
      (R26 教训: 4 sibling broken `{{Deserialize, Serialize}}`)

      ## `#[serde(...)]` attribute scope
      必在 `#[derive(Serialize, Deserialize)]` 之前, 或 `use serde;` 在 scope
      (R26 教训: 丢 1 行导致首个 #[serde] 前无 derive)

      ## PREFLIGHT + Implementation + Commit
      Same as R40a. Commit:
