<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- northing logo: three concentric arcs, gaps at north, outer endpoints probe outward+up -->
  <!-- Center: (100, 100). North = top = 12 o'clock = -90 degrees in SVG arc math -->
  
  <!-- INNER ARC: r=30, stroke=2.5, spans 310° (gap 50° centered at north/-90°) -->
  <!-- Start: -90° + 25° = -65° → End: -90° - 25° = -115° (going clockwise 310°) -->
  <!-- In SVG: start at -65° (=295°), sweep 310° clockwise -->
  <path d="M 112.68 72.84
           A 30 30 0 1 1 87.32 72.84"
        fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- MIDDLE ARC: r=52, stroke=5, spans 310° (gap 50° centered at -85°, offset 5° CCW) -->
  <!-- Start: -85° + 25° = -60° → End: -85° - 25° = -110° -->
  <path d="M 126 54.97
           A 52 52 0 1 1 82.28 51.22"
        fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  
  <!-- OUTER ARC: r=76, stroke=9, spans 300° (gap 60° centered at -95°, offset 5° CW) -->
  <!-- Main arc body -->
  <!-- Start: -95° + 30° = -65° → End: -95° - 30° = -125° -->
  <path d="M 132.13 31.13
           A 76 76 0 1 1 56.35 37.47"
        fill="none" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
  
  <!-- OUTER ARC LEFT ENDPOINT PROBE: extends outward+upward from the left end -->
  <!-- The left end is at angle -125° on r=76. Probe extends outward (away from center) + 15° upward -->
  <!-- Direction: outward from center at -125° = pointing at -125° from center, then rotated 15° toward north -->
  <!-- So probe direction ≈ -140° (outward + slightly up/north) -->
  <!-- Start point: (56.35, 37.47) — the left end of the outer arc -->
  <!-- Probe length: ~12 units, direction: outward+up -->
  <path d="M 56.35 37.47
           Q 48 30, 44 24"
        fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  
  <!-- OUTER ARC RIGHT ENDPOINT PROBE: extends outward+upward from the right end (shorter) -->
  <!-- The right end is at angle -65° on r=76. Probe extends outward + slightly up -->
  <!-- Direction: outward at -65° rotated 10° toward north ≈ -75° -->
  <!-- Start point: (132.13, 31.13) — the right end of the outer arc -->
  <!-- Probe length: ~9 units (shorter than left = asymmetric) -->
  <path d="M 132.13 31.13
           Q 137 24, 139 19"
        fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
</svg>
