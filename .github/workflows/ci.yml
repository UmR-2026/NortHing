name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'png/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'png/**'

# Cancel previous runs on same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Rust: build check ─────────────────────────────────────────────
  rust-build-check:
    name: Rust Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenSSL (Windows, prebuilt)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/ci/setup-openssl-windows.ps1

      - name: Create mobile-web dist directory (placeholder)
        shell: bash
        run: |
          # v0.1.0: web-ui build disabled; create empty dist to avoid
          # downstream path errors if any compile-time embeds reference it.
          mkdir -p src/mobile-web/dist
          echo '{"version":"v0.1.0-placeholder"}' > src/mobile-web/dist/.gitkeep

      - name: Install Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_PKG=libwebkit2gtk-4.0-dev
          fi

          if apt-cache show libappindicator3-dev >/dev/null 2>&1; then
            APPINDICATOR_PKG=libappindicator3-dev
          else
            APPINDICATOR_PKG=libayatana-appindicator3-dev
          fi

          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            "$WEBKIT_PKG" \
            "$APPINDICATOR_PKG" \
            librsvg2-dev \
            patchelf \
            libleptonica-dev \
            libtesseract-dev \
            tesseract-ocr \
            tesseract-ocr-eng

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "ci-check-v2-${{ runner.os }}-no-cargo-bin-v1"
          cache-bin: false
          # PR caches are scoped to merge refs; main pushes own shared cache refreshes.
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Check compilation
        run: cargo check --workspace --exclude northhing-cli --exclude northhing

      - name: Run core Rust tests
        run: cargo test --locked -p northhing-core

  # ── kernel-api dependency guard ─────────────────────────────────────
  kernel-api-clean:
    name: kernel-api dep guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check prohibited deps in kernel-api
        run: |
          # kernel-api must not depend on rmcp, git2, axum, tower-http, reqwest, or northhing-core
          DEPS=$(cargo tree -p northhing-kernel-api 2>/dev/null)
          # Third-party prohibited deps: substring match is safe
          for crate in rmcp git2 axum tower-http reqwest; do
            if echo "$DEPS" | grep -q "$crate"; then
              echo "ERROR: kernel-api depends on prohibited crate: $crate"
              exit 1
            fi
          done
          # northhing-core: use word-boundary match to avoid false positive on northhing-core-types
          if echo "$DEPS" | grep -qE '(^|[^a-z0-9_-])northhing-core($|[^a-z0-9_-])'; then
            echo "ERROR: kernel-api depends on prohibited crate: northhing-core"
            exit 1
          fi
          echo "kernel-api dependency guard passed"

